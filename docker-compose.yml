version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_APP_URL=https://build.faithconnect.us/
      # Ensure JWT_SECRET is set (will be generated by script if missing, but good to be explicit for compose)
      - JWT_SECRET=c4c3e9e1f8c6dac771b2f71ac325b815406c4fe21b4db4d57aa694ddff57f4cf
      - ENCRYPTION_KEY=8f6433017fa944fa8fa4364b6c92601e52468aba8e2240aa9bb2a74dfa42412e
    volumes:
      - ./data:/var/local/Claudable/data
      - ./prisma/data:/var/local/Claudable/prisma/data
      # Mount projects directory so it persists
      - ./data/projects:/var/local/Claudable/data/projects
    # We do NOT expose port 3000 to host directly, only internal network
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
