version: '3.8'

services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_APP_URL=https://build.faithconnect.us/
      - NEXT_PUBLIC_API_BASE=https://build.faithconnect.us
      # Ensure JWT_SECRET is set (will be generated by script if missing, but good to be explicit for compose)
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
    volumes:
      - ./data:/var/local/Claudable/data
      - ./prisma/data:/var/local/Claudable/prisma/data
      # Mount projects directory so it persists
      - ./data/projects:/var/local/Claudable/data/projects
    # We do NOT expose port 3000 to host directly, only internal network
    expose:
      - "3000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
