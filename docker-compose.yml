version: '3.8'

services:
  app:
    build:
      context: .
      target: app
      args:
        - CLAUDE_PW=${CLAUDE_PW:-claude}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://build.faithconnect.us/}
        - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-https://build.faithconnect.us}
        - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    restart: unless-stopped
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://build.faithconnect.us/}
      - NEXT_PUBLIC_API_BASE=${NEXT_PUBLIC_API_BASE:-https://build.faithconnect.us}
      # Ensure JWT_SECRET is set (will be generated by script if missing, but good to be explicit for compose)
      - JWT_SECRET=${JWT_SECRET}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    volumes:
      - ./data:/var/local/Claudable/data
      - ./prisma/data:/var/local/Claudable/prisma/data
      # Mount projects directory so it persists
      - ./data/projects:/var/local/Claudable/data/projects
    # We do NOT expose port 3000 to host directly, only internal network
    expose:
      - "3000"

  caddy:
    build:
      context: .
      target: caddy
    restart: unless-stopped
    environment:
      - CLOUDFLARE_API_TOKEN=${CLOUDFLARE_API_TOKEN}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
